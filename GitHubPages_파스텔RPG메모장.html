
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pastel RPG Memo</title>
<style>
*{box-sizing:border-box}
body{
 margin:0;padding:30px;
 background:linear-gradient(#bfe3ff,#fff6b8);
 font-family:Verdana,sans-serif;
}
.memo{max-width:700px;margin:auto;position:relative}
.cloud,.cloud2,.star,.flower{position:absolute;pointer-events:none}
.cloud{top:-20px;left:-10px;font-size:28px}
.cloud2{top:-10px;right:0;font-size:24px}
.star{top:10px;right:40px}
.flower{bottom:10px;right:10px}

input{display:none}
.tabs{display:flex;gap:6px;position:relative;z-index:2}
.tabs label{
 flex:1;text-align:center;padding:12px;
 border:4px solid #2d3a4d;border-bottom:none;
 border-radius:18px 18px 0 0;
 background:#9ed8ff;
 cursor:pointer;font-weight:bold;
 transition:.15s steps(3);
 box-shadow:0 -3px 0 rgba(255,255,255,.8) inset;
}
.tabs label:hover{transform:translateY(-2px)}
#t1:checked~.tabs label[for=t1],
#t2:checked~.tabs label[for=t2],
#t3:checked~.tabs label[for=t3]{
 background:#fff4a8;
 transform:translateY(5px) scale(1.04);
}

.book{
 margin-top:-4px;
 border:4px solid #2d3a4d;
 border-radius:0 22px 22px 22px;
 padding:22px;
 min-height:320px;
 position:relative;
 background:
 linear-gradient(45deg,rgba(255,255,255,.15) 25%,transparent 25%,transparent 75%,rgba(255,255,255,.15) 75%),
 linear-gradient(45deg,rgba(255,255,255,.15) 25%,transparent 25%,transparent 75%,rgba(255,255,255,.15) 75%),
 #fffbe0;
 background-size:16px 16px;
 background-position:0 0,8px 8px;
 box-shadow:10px 10px 0 rgba(0,0,0,.15);
}
.book:before{
 content:"";
 position:absolute;left:0;top:0;bottom:0;width:18px;
 background:linear-gradient(#8fd0ff,#fff2a0);
 border-right:3px dashed rgba(0,0,0,.25);
 border-radius:0 0 0 18px;
}
.page{
 display:none;
 margin-left:16px;
 padding:12px;
 border:2px dashed #87c6ff;
 border-radius:12px;
 background:rgba(255,255,255,.55);
 min-height:230px;
 animation:page .35s steps(6);
}
@keyframes page{
 0%{opacity:0;transform:translateX(40px) scale(.95)}
 60%{transform:translateX(-5px) scale(1.02)}
 100%{opacity:1;transform:none}
}
#t1:checked~.book .p1,
#t2:checked~.book .p2,
#t3:checked~.book .p3{display:block}

.sparkle{
 position:absolute;right:24px;top:20px;
 animation:twinkle 1.8s infinite;
}
@keyframes twinkle{
 0%,100%{opacity:.4;transform:scale(1)}
 50%{opacity:1;transform:scale(1.3)}
}
@media(max-width:600px){
 body{padding:12px}
 .tabs label{font-size:14px}
}
</style>
</head>
<body>
<div class="memo">
<div class="cloud">☁️</div>
<div class="cloud2">☁️</div>
<div class="star">⭐</div>

<input id="t1" name="tab" type="radio" checked>
<input id="t2" name="tab" type="radio">
<input id="t3" name="tab" type="radio">

<div class="tabs">
<label for="t1">📑 메모 1</label>
<label for="t2">📑 메모 2</label>
<label for="t3">📑 메모 3</label>
</div>

<div class="book">
<div class="sparkle">✨</div>

<div class="page p1">
<h3>첫 번째 페이지</h3>
<p>하늘색 + 연노랑 파스텔 RPG UI</p>
<p>픽셀 체크무늬 배경과 책등 표현이 적용되어 있습니다.</p>
</div>

<div class="page p2">
<h3>두 번째 페이지</h3>
<p>탭이 책갈피처럼 보이도록 디자인했습니다.</p>
<p>CSS만 사용하므로 GitHub Pages에서 PC/모바일 모두 동일하게 보입니다.</p>
</div>

<div class="page p3">
<h3>세 번째 페이지</h3>
<p>페이지가 옆에서 넘어오는 RPG 메뉴 스타일 애니메이션.</p>
<p>원하는 내용을 자유롭게 수정하세요.</p>
</div>
</div>

<div class="flower">🌼</div>
</div>
</body>
</html>
